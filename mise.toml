[tools]
# Language runtimes — pinned to match go.mod, the Dockerfile and CI
go = "1.26"      # go.mod
node = "24"      # Dockerfile (node:24.16.0) / ci-frontend NODE_VERSION
yarn = "1"       # classic, matches ui/yarn.lock

# Kubernetes & dev CLIs (float like CI; pinned exactly via mise.lock)
kubectl = "latest"
helm = "latest"
kind = "latest"
yq = "latest"
golangci-lint = "latest"

# Docs toolchain
uv = "latest"

# Not managed here (system-level): docker + buildx/compose, make, git.

[env]
# Automatic virtualenv activation for the docs toolchain
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Install documentation dependencies"
run = "uv pip install -r requirements.txt"

[tasks.mkdocs-serve]
depends = "install"
description = "Serve MkDocs documentation locally"
run = "uv run mkdocs serve"

[tasks.lint]
description = "Run golangci-lint (no make target exists for it)"
run = "golangci-lint run ./..."
