config:
  burrito:
    runner:
      image:
        repository: burrito
        tag: "1784906373"
        pullPolicy: Never
    datastore:
      storage:
        mock: true
    controller:
      timers:
        driftDetection: 10m
        repositorySync: 1m
    server:
      # -- Externally-reachable URL of the Burrito dashboard, used to build "Details" links
      # on commit statuses. Leave empty to disable those links (ex: https://burrito.example.com)
      publicUrl: "http://localhost:8080"
global:
  deployment:
    image:
      repository: burrito
      tag: "1784906373"
      pullPolicy: Never
tenants:
  - namespace:
      create: true
      name: "burrito-project"
